<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TrinDeckly Quiz Results</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <link rel="stylesheet" href="/quiz-common.css" />
</head>
<body class="quiz-body">
  <div class="quiz-shell">
    <aside class="quiz-sidebar">
      <div class="quiz-sidebar-inner">
        <div class="quiz-panel rounded-4 p-3">
          <div class="d-flex align-items-center gap-3 fw-semibold fs-5">
            <div class="quiz-brand"><i class="bi bi-stack"></i></div>
            <span>TrinDeckly</span>
          </div>
        </div>
        <nav class="quiz-panel quiz-nav rounded-4 p-2 nav nav-pills flex-column gap-1">
          <a class="nav-link" href="/"><i class="bi bi-grid-1x2-fill"></i><span>Home</span></a>
          <a class="nav-link" href="/#decksSection"><i class="bi bi-collection-fill"></i><span>My Decks</span></a>
          <a class="nav-link active" href="/quiz"><i class="bi bi-patch-check-fill"></i><span>Quiz</span></a>
          <a class="nav-link" href="/settings.html"><i class="bi bi-sliders"></i><span>Settings</span></a>
        </nav>
      </div>
    </aside>

    <main class="quiz-main">
      <div class="quiz-topbar">
        <div>
          <a class="quiz-link-btn small text-uppercase" id="backToQuizLink" href="/quiz"><i class="bi bi-arrow-left me-2"></i>Back to Quiz</a>
          <h1 class="quiz-page-title mt-2">Quiz results</h1>
          <p class="quiz-page-subtitle">Structured scoring, clear correctness, and a dedicated answer review flow.</p>
        </div>
        <div class="dropdown">
          <button class="btn quiz-account-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">
            <span class="quiz-avatar" id="accountAvatar">G</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end rounded-4 p-2">
            <li class="quiz-account-summary px-3 py-2 d-none" id="accountSummary">
              <div class="d-flex align-items-center gap-3">
                <div class="quiz-avatar" id="menuAvatar">G</div>
                <div class="min-w-0">
                  <strong class="d-block text-truncate" id="profileName">Guest</strong>
                  <small class="text-secondary text-truncate d-block" id="profileEmail">Sign in</small>
                </div>
              </div>
            </li>
            <li id="guestActions"><button class="dropdown-item rounded-3" id="accountLoginBtn" type="button">Log in</button></li>
            <li id="guestSignupWrap"><button class="dropdown-item rounded-3" id="accountSignupBtn" type="button">Sign up</button></li>
            <li class="d-none" id="userActions">
              <button class="dropdown-item rounded-3" id="accountProfileBtn" type="button">Profile</button>
              <button class="dropdown-item rounded-3" id="accountSettingsBtn" type="button">Settings</button>
              <hr class="dropdown-divider border-secondary my-2">
              <button class="dropdown-item rounded-3 text-danger" id="accountLogoutBtn" type="button">Log out</button>
            </li>
          </ul>
        </div>
      </div>

      <div id="resultsState" class="quiz-grid"></div>
    </main>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="/quiz-common.js"></script>
  <script>
    const pathSegments = window.location.pathname.split("/").filter(Boolean);
    const quizId = pathSegments[1];
    const attemptId = pathSegments[3];
    const resultsState = document.getElementById("resultsState");
    const backToQuizLink = document.getElementById("backToQuizLink");

    function performanceClass(percentage) {
      if (percentage >= 80) return "performance-high";
      if (percentage >= 50) return "performance-medium";
      return "performance-low";
    }

    function resultMessage(result) {
      if (result.percentage >= 85) return "Strong result. You handled this quiz with confidence.";
      if (result.percentage >= 60) return "Solid pass. A quick review will lock in the weaker parts.";
      return "You finished the quiz. Review the missed answers and run it again once more.";
    }

    async function loadResults() {
      const shell = await quizApp.initShell();
      if (!shell.currentUser) {
        quizApp.requireAuthNotice(resultsState);
        return;
      }

      const result = await quizApp.api(`/quiz-attempts/${attemptId}/results`);
      backToQuizLink.href = `/quiz/${quizId}`;
      const score = Math.round(result.percentage);
      const toneClass = performanceClass(result.percentage);
      const timeValue = result.completion_time_seconds || 0;

      resultsState.innerHTML = `
        <section class="quiz-results-stage">
          <article class="quiz-card quiz-results-card rounded-4 ${toneClass}">
            <div class="quiz-results-kicker">Completed</div>
            <div class="quiz-score-wrap">
              <div class="quiz-score-label">Your score</div>
              <div class="quiz-score-value">${score}%</div>
            </div>
            <div class="mt-3">
              <h2 class="quiz-results-title">${quizApp.escapeHtml(result.quiz_title)}</h2>
              <p class="quiz-results-summary">${result.correct_count} correct, ${result.wrong_count} wrong. ${quizApp.escapeHtml(resultMessage(result))}</p>
            </div>
            <div class="quiz-results-meta">
              <div class="quiz-results-stat">
                <div class="quiz-results-stat-label">Correct</div>
                <span class="quiz-results-stat-value is-correct">${result.correct_count}</span>
              </div>
              <div class="quiz-results-stat">
                <div class="quiz-results-stat-label">Wrong</div>
                <span class="quiz-results-stat-value is-wrong">${result.wrong_count}</span>
              </div>
              <div class="quiz-results-stat">
                <div class="quiz-results-stat-label">Reviewed</div>
                <span class="quiz-results-stat-value">${result.total_questions}</span>
              </div>
            </div>
            <div class="quiz-results-time">Completed in ${timeValue}s</div>
            <div class="quiz-results-actions">
              <a class="btn btn-light text-dark rounded-pill px-4" href="/quiz/${quizId}/results/${attemptId}/review">Review answers</a>
              <a class="btn btn-outline-light rounded-pill px-4" href="/quiz/${quizId}/start">Restart quiz</a>
              <a class="quiz-tertiary-link" href="/quiz/${quizId}"><i class="bi bi-arrow-left"></i><span>Back to details</span></a>
            </div>
          </article>
        </section>
      `;
    }

    loadResults().catch((error) => {
      resultsState.innerHTML = `<div class="quiz-empty text-danger">${quizApp.escapeHtml(error.message)}</div>`;
    });
  </script>
</body>
</html>
