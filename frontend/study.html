<!doctype html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TrinDeckly Study</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
    <link rel="stylesheet" href="/study.css?v=word-list-entry" />

</head>
<body>
  <div class="container-fluid px-0">
    <div class="row g-0 min-vh-100">
      <aside class="col-12 col-lg-3 col-xl-2 sidebar-shell p-3 p-xl-4 d-flex flex-column gap-3" id="sidebarShell"></aside>

      <main class="col-12 col-lg-9 col-xl-10 p-3 p-lg-4 p-xl-4 study-main">
        <div class="d-grid gap-4 hub-layout">
          <section class="card surface-card shadow-sm rounded-4 hub-header" id="hubHeader">
            <div class="card-body d-flex flex-column flex-xl-row justify-content-between align-items-xl-center gap-4">
              <div>
                <p class="text-secondary text-uppercase small fw-semibold mb-2" id="deckEyebrow">Deck Study Hub</p>
                <h1 class="display-5 fw-bold mb-2" id="deckTitle">Loading deck...</h1>
                <p class="text-secondary mb-0" id="deckSubtitle">Choose how you want to study before the session starts.</p>
                <div class="d-flex align-items-center gap-2 flex-wrap mt-3 deck-meta-row">
                  <span class="small text-secondary" id="deckOwnerLabel">Created by ...</span>
                  <span class="badge rounded-pill text-bg-secondary d-none" id="readOnlyBadge">Read only</span>
                  <span class="badge rounded-pill text-bg-info d-none" id="savedDeckBadge">Saved deck</span>
                  <span class="badge rounded-pill text-bg-secondary" id="privacyBadge">Private</span>
                  <span class="small text-secondary" id="shareAccessHint">Password-protected access.</span>
                </div>
              </div>
              <div class="d-flex flex-wrap gap-2 justify-content-xl-end header-actions">
                <button class="btn btn-outline-light rounded-4 header-action-light d-none" id="cloneDeckBtn" type="button"><i class="bi bi-bookmark-plus me-2"></i>Save to My Decks</button>
                <a class="btn btn-light text-dark rounded-4 header-action-edit" id="editDeckBtn" href="#"><i class="bi bi-list-ul me-2"></i>Word List</a>
                <button class="btn btn-outline-light rounded-4 header-action-light" id="groupsBtn" type="button">Groups</button>
                <button class="btn btn-outline-light rounded-4 header-action-light" id="shareBtn" type="button">Share</button>
                <div class="dropdown">
                  <button class="btn btn-outline-light rounded-4 dropdown-toggle header-action-light" id="moreBtn" type="button" data-bs-toggle="dropdown">More</button>
                  <ul class="dropdown-menu dropdown-menu-end rounded-4 p-2" id="deckMenu">
                    <li><button class="dropdown-item rounded-3" type="button" id="openEditorMenuBtn">Open Word List</button></li>
                    <li><button class="dropdown-item rounded-3" type="button" id="shuffleNowBtn">Shuffle Session</button></li>
                    <li><button class="dropdown-item rounded-3" type="button" id="copyDeckLinkBtn">Copy Deck Link</button></li>
                  </ul>
                </div>
                <div id="accountMenuSlot"></div>
              </div>
            </div>
          </section>

          <section class="card surface-card shadow-sm rounded-4 modes-section" id="modesSection">
            <div class="card-body d-grid gap-4">
              <div>
                <h2 class="h3 mb-1 modes-title">Study Modes</h2>
                <p class="text-secondary mb-0 modes-subtitle">Switch how this session works without leaving the deck.</p>
              </div>
              <div class="row g-3" id="modeGrid"></div>
              <div class="card bg-dark border-secondary rounded-4 d-none" id="setupPanel"></div>
            </div>
          </section>

          <section class="row g-3 stats-row" id="statsGrid"></section>

          <section class="d-grid gap-3 study-stage" id="studyStage">
            <article class="card viewer-card surface-card shadow-sm rounded-4" id="cardViewer"></article>
            <div class="card control-card shadow-sm rounded-4" id="controlBar"></div>
          </section>
        </div>
      </main>
    </div>
  </div>
  <section class="focus-topbar d-none" id="focusTopbar" aria-label="Focus study header">
    <div class="focus-topbar-left">
      <button class="btn focus-exit-btn" type="button" id="focusExitBtn">
        <i class="bi bi-fullscreen-exit me-2"></i>Exit fullscreen
      </button>
      <div class="focus-topbar-meta">
        <span class="focus-mode-chip" id="focusModeChip">Study</span>
        <span class="focus-deck-title" id="focusDeckTitleLabel">Deck</span>
      </div>
    </div>
    <div class="focus-progress-pill" id="focusProgressPill">0 / 0</div>
  </section>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="/app-shell.js"></script>
  <script src="/app-common.js"></script>
  <script src="/study-session.js?v=word-list-entry"></script>
  <script src="/study-actions.js?v=word-list-entry"></script>
  <script src="/study-viewer.js?v=word-list-entry"></script>
  <script src="/study-controls.js?v=word-list-entry"></script>
  <script src="/study-render.js?v=word-list-entry"></script>
  <script src="/study-page.js?v=word-list-entry"></script>
</body>
</html>
