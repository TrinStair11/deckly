<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TrinDeckly Quiz Session</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <link rel="stylesheet" href="/quiz-common.css" />
</head>
<body class="quiz-body">
  <div class="quiz-shell">
    <aside class="quiz-sidebar">
      <div class="quiz-sidebar-inner">
        <div class="quiz-panel rounded-4 p-3">
          <div class="d-flex align-items-center gap-3 fw-semibold fs-5">
            <div class="quiz-brand"><i class="bi bi-stack"></i></div>
            <span>TrinDeckly</span>
          </div>
        </div>
        <nav class="quiz-panel quiz-nav rounded-4 p-2 nav nav-pills flex-column gap-1">
          <a class="nav-link" href="/"><i class="bi bi-grid-1x2-fill"></i><span>Home</span></a>
          <a class="nav-link" href="/#decksSection"><i class="bi bi-collection-fill"></i><span>My Decks</span></a>
          <a class="nav-link active" href="/quiz"><i class="bi bi-patch-check-fill"></i><span>Quiz</span></a>
          <a class="nav-link" href="/settings.html"><i class="bi bi-sliders"></i><span>Settings</span></a>
        </nav>
      </div>
    </aside>

    <main class="quiz-main">
      <div class="quiz-topbar">
        <div>
          <a class="quiz-link-btn small text-uppercase" id="backToQuizLink" href="/quiz"><i class="bi bi-arrow-left me-2"></i>Back to Quiz</a>
          <h1 class="quiz-page-title mt-2" id="sessionTitle">Starting quiz...</h1>
          <p class="quiz-page-subtitle" id="sessionSubtitle">Preparing question flow and answer state.</p>
        </div>
        <div class="dropdown">
          <button class="btn quiz-account-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">
            <span class="quiz-avatar" id="accountAvatar">G</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end rounded-4 p-2">
            <li class="quiz-account-summary px-3 py-2 d-none" id="accountSummary">
              <div class="d-flex align-items-center gap-3">
                <div class="quiz-avatar" id="menuAvatar">G</div>
                <div class="min-w-0">
                  <strong class="d-block text-truncate" id="profileName">Guest</strong>
                  <small class="text-secondary text-truncate d-block" id="profileEmail">Sign in</small>
                </div>
              </div>
            </li>
            <li id="guestActions"><button class="dropdown-item rounded-3" id="accountLoginBtn" type="button">Log in</button></li>
            <li id="guestSignupWrap"><button class="dropdown-item rounded-3" id="accountSignupBtn" type="button">Sign up</button></li>
            <li class="d-none" id="userActions">
              <button class="dropdown-item rounded-3" id="accountProfileBtn" type="button">Profile</button>
              <button class="dropdown-item rounded-3" id="accountSettingsBtn" type="button">Settings</button>
              <hr class="dropdown-divider border-secondary my-2">
              <button class="dropdown-item rounded-3 text-danger" id="accountLogoutBtn" type="button">Log out</button>
            </li>
          </ul>
        </div>
      </div>

      <div id="sessionState" class="quiz-grid"></div>
    </main>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="/quiz-common.js"></script>
  <script>
    const pathSegments = window.location.pathname.split("/").filter(Boolean);
    const quizId = pathSegments[1];
    const attemptStorageKey = `quiz-attempt:${quizId}`;

    const state = {
      currentIndex: 0,
      attempt: null,
    };

    const sessionState = document.getElementById("sessionState");
    const sessionTitle = document.getElementById("sessionTitle");
    const sessionSubtitle = document.getElementById("sessionSubtitle");
    const backToQuizLink = document.getElementById("backToQuizLink");

    function currentQuestion() {
      return state.attempt?.questions?.[state.currentIndex] || null;
    }

    function renderSession() {
      const question = currentQuestion();
      if (!state.attempt || !question) {
        sessionState.innerHTML = `<div class="quiz-empty">Quiz attempt could not be loaded.</div>`;
        return;
      }

      const progress = state.attempt.total_questions ? ((state.currentIndex + 1) / state.attempt.total_questions) * 100 : 0;
      sessionTitle.textContent = state.attempt.quiz_title;
      sessionSubtitle.textContent = "Select one answer and continue to the next question.";
      backToQuizLink.href = `/quiz/${state.attempt.quiz_id}`;

      sessionState.innerHTML = `
        <section class="quiz-card rounded-4 p-4 quiz-session-stage">
          <div class="quiz-question-progress mb-4">
            <div class="d-flex justify-content-between align-items-end gap-3 mb-2 flex-wrap">
              <div>
                <div class="small text-uppercase text-secondary">Progress</div>
                <div class="quiz-question-progress-count">${state.currentIndex + 1} / ${state.attempt.total_questions}</div>
              </div>
              <div class="quiz-question-progress-note">
                ${question.selected_option_id === null ? "Choose the best answer to continue." : "Answer selected. Continue when ready."}
              </div>
            </div>
            <div class="quiz-progress">
              <div class="quiz-progress-bar" style="width:${progress.toFixed(2)}%"></div>
            </div>
          </div>
          <article class="quiz-card quiz-question-card rounded-4 p-4">
            <div class="quiz-question-body">
              <div class="quiz-question-kicker">Question</div>
              <h2 class="quiz-question-title mt-2 mb-4">${quizApp.escapeHtml(question.question_text)}</h2>
              <div class="quiz-question-options">
                ${question.options.map((option, optionIndex) => `
                  <button class="quiz-option ${question.selected_option_id === option.id ? "selected" : ""}" type="button" data-option-id="${option.id}">
                    <span class="quiz-option-content">
                      <span class="quiz-option-letter fw-semibold">${String.fromCharCode(65 + optionIndex)}</span>
                      <span class="quiz-option-text">${quizApp.escapeHtml(option.option_text)}</span>
                    </span>
                  </button>
                `).join("")}
              </div>
            </div>
            <div class="quiz-question-actions">
              <button class="btn btn-outline-light rounded-pill px-4" type="button" id="prevQuestionBtn" ${state.currentIndex === 0 ? "disabled" : ""}>Previous</button>
              <div class="d-flex gap-2 flex-wrap justify-content-end">
                <button class="btn btn-outline-danger rounded-pill px-4" type="button" id="finishQuizBtn">Finish quiz</button>
                <button class="btn btn-light text-dark rounded-pill px-4 quiz-next-btn" type="button" id="nextQuestionBtn" ${question.selected_option_id === null ? "disabled" : ""}>
                  ${state.currentIndex === state.attempt.total_questions - 1 ? "Submit quiz" : "Next question"}
                </button>
              </div>
            </div>
          </article>
        </section>
      `;

      document.querySelectorAll("[data-option-id]").forEach((button) => {
        button.addEventListener("click", async () => {
          try {
            const nextState = await quizApp.api(`/quiz-attempts/${state.attempt.id}/answers/${question.id}`, {
              method: "PUT",
              body: JSON.stringify({ selected_option_id: Number(button.dataset.optionId) }),
            });
            state.attempt = nextState;
            renderSession();
          } catch (error) {
            window.alert(error.message);
          }
        });
      });

      document.getElementById("prevQuestionBtn").addEventListener("click", () => {
        state.currentIndex = Math.max(state.currentIndex - 1, 0);
        renderSession();
      });
      document.getElementById("finishQuizBtn").addEventListener("click", async () => {
        const remaining = Math.max(state.attempt.total_questions - state.attempt.answered_count, 0);
        const shouldFinish = remaining > 0
          ? window.confirm(`Finish quiz now? ${remaining} question${remaining === 1 ? "" : "s"} will be marked as unanswered.`)
          : window.confirm("Finish quiz now?");
        if (!shouldFinish) return;
        const result = await quizApp.api(`/quiz-attempts/${state.attempt.id}/complete`, { method: "POST" });
        sessionStorage.removeItem(attemptStorageKey);
        window.location.href = `/quiz/${state.attempt.quiz_id}/results/${result.id}`;
      });
      document.getElementById("nextQuestionBtn").addEventListener("click", async () => {
        if (state.currentIndex === state.attempt.total_questions - 1) {
          const result = await quizApp.api(`/quiz-attempts/${state.attempt.id}/complete`, { method: "POST" });
          sessionStorage.removeItem(attemptStorageKey);
          window.location.href = `/quiz/${state.attempt.quiz_id}/results/${result.id}`;
          return;
        }
        state.currentIndex = Math.min(state.currentIndex + 1, state.attempt.total_questions - 1);
        renderSession();
      });
    }

    async function hydrateAttempt() {
      const storedAttemptId = sessionStorage.getItem(attemptStorageKey);
      if (storedAttemptId) {
        try {
          const attempt = await quizApp.api(`/quiz-attempts/${storedAttemptId}`);
          if (attempt.status === "in_progress") {
            state.attempt = attempt;
            state.currentIndex = attempt.current_question_index || 0;
            return;
          }
        } catch (error) {
          sessionStorage.removeItem(attemptStorageKey);
        }
      }

      const attempt = await quizApp.api(`/quizzes/${quizId}/start`, { method: "POST" });
      state.attempt = attempt;
      state.currentIndex = attempt.current_question_index || 0;
      sessionStorage.setItem(attemptStorageKey, String(attempt.id));
    }

    async function boot() {
      const shell = await quizApp.initShell();
      if (!shell.currentUser) {
        quizApp.requireAuthNotice(sessionState, "Sign in to take quizzes", "Attempts, scores, and review history are saved per account.");
        return;
      }
      await hydrateAttempt();
      renderSession();
    }

    boot().catch((error) => {
      sessionState.innerHTML = `<div class="quiz-empty text-danger">${quizApp.escapeHtml(error.message)}</div>`;
    });
  </script>
</body>
</html>
