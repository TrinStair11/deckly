<!doctype html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TrinDeckly Главная</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <link rel="stylesheet" href="/pages/home/index.css" />
</head>
<body>
  <div class="container-fluid px-0">
    <div class="row g-0 min-vh-100">
      <aside class="col-12 col-lg-3 col-xl-2 sidebar-shell p-3 p-xl-4 d-flex flex-column gap-3" id="sidebarShell"></aside>

      <main class="col-12 col-lg-9 col-xl-10 p-3 p-lg-4 p-xl-4">
        <div class="d-grid gap-4">
          <section class="card hero-card surface-card shadow-sm rounded-4">
            <div class="card-body p-4 p-xl-4 d-flex flex-column flex-xl-row justify-content-between align-items-xl-center gap-4">
              <div>
                <p class="hero-kicker">Dashboard</p>
                <h1 class="hero-title">Welcome back</h1>
                <p class="hero-subtitle" id="headerSubtitle">You have 0 cards to review today.</p>
              </div>
              <div class="hero-actions">
                <button class="btn btn-light hero-cta text-dark" id="createDeckBtn" type="button">
                  <i class="bi bi-plus-lg me-2"></i>Create New Deck
                </button>
                <div id="accountMenuSlot"></div>
              </div>
            </div>
          </section>

          <section class="row g-3" id="statsSection">
            <div class="col-12 col-md-6 col-xxl-3">
              <div class="card stat-card shadow-sm rounded-4 h-100">
                <div class="card-body p-4">
                  <div class="d-flex justify-content-between align-items-start mb-4">
                    <div class="stat-icon"><i class="bi bi-stack"></i></div>
                  </div>
                  <div class="stat-label">Total Cards</div>
                  <div class="stat-value" id="statCards">0</div>
                </div>
              </div>
            </div>
            <div class="col-12 col-md-6 col-xxl-3">
              <div class="card stat-card shadow-sm rounded-4 h-100">
                <div class="card-body p-4">
                  <div class="d-flex justify-content-between align-items-start mb-4">
                    <div class="stat-icon text-success"><i class="bi bi-check2-circle"></i></div>
                    <span class="badge text-bg-success rounded-pill" id="learnedBadge">+0%</span>
                  </div>
                  <div class="stat-label">Learned</div>
                  <div class="stat-value" id="statLearned">0</div>
                </div>
              </div>
            </div>
            <div class="col-12 col-md-6 col-xxl-3">
              <div class="card stat-card shadow-sm rounded-4 h-100">
                <div class="card-body p-4">
                  <div class="d-flex justify-content-between align-items-start mb-4">
                    <div class="stat-icon text-warning"><i class="bi bi-clock-history"></i></div>
                  </div>
                  <div class="stat-label">To Review</div>
                  <div class="stat-value" id="statDue">0</div>
                </div>
              </div>
            </div>
            <div class="col-12 col-md-6 col-xxl-3">
              <div class="card stat-card shadow-sm rounded-4 h-100">
                <div class="card-body p-4">
                  <div class="d-flex justify-content-between align-items-start mb-4">
                    <div class="stat-icon text-info"><i class="bi bi-calendar3"></i></div>
                  </div>
                  <div class="stat-label">Streak</div>
                  <div class="stat-value" id="statStreak">0 days</div>
                </div>
              </div>
            </div>
          </section>

          <section class="card surface-card decks-card shadow-sm rounded-4" id="decksSection">
            <div class="card-body d-grid gap-3">
              <div class="d-flex flex-column flex-xl-row justify-content-between align-items-xl-center gap-3">
                <div>
                  <h2 class="decks-title">My Decks</h2>
                  <p class="decks-subtitle">Manage your decks, filter fast, and jump directly into review sessions.</p>
                </div>
                <div class="d-flex flex-wrap gap-2 w-100 w-xl-auto justify-content-xl-end decks-controls">
                  <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary"><i class="bi bi-search"></i></span>
                    <input class="form-control bg-dark border-secondary" id="searchInput" type="search" placeholder="Search decks" />
                  </div>
                  <button class="btn btn-outline-light" id="sortBtn" type="button">Sort by Updated</button>
                  <button class="btn btn-outline-light" id="layoutBtn" type="button"><i class="bi bi-grid-3x2-gap"></i></button>
                  <button class="btn btn-outline-light" id="filterBtn" type="button">Filter</button>
                </div>
              </div>
              <div class="row g-3" id="decksGrid"></div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4 shadow">
        <div class="modal-header border-secondary">
          <div>
            <h3 class="h4 mb-1">TrinDeckly Access</h3>
            <p class="text-secondary mb-0">Login before creating or editing decks.</p>
          </div>
          <button class="btn-close btn-close-white" id="closeModalBtn" type="button" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="nav nav-pills nav-fill mb-4">
            <button class="nav-link active" id="loginTab" type="button">Login</button>
            <button class="nav-link" id="registerTab" type="button">Register</button>
          </div>
          <form class="d-grid gap-3" id="authForm">
            <div>
              <label class="form-label">Email</label>
              <input class="form-control bg-dark border-secondary" id="email" type="email" required />
            </div>
            <div>
              <label class="form-label">Password</label>
              <input class="form-control bg-dark border-secondary" id="password" type="password" minlength="6" required />
            </div>
            <button class="btn btn-light text-dark" id="authSubmitBtn" type="submit">Login</button>
          </form>
          <div class="status small fw-semibold mt-3" id="authStatus"></div>
        </div>
      </div>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="/shared/scripts/app-shell.js"></script>
  <script src="/shared/scripts/app-common.js"></script>
  <script src="/shared/scripts/app-auth.js"></script>
  <script src="/pages/home/index-page.js"></script>
</body>
</html>
